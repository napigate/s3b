services:
  s3b:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-alpine}
    environment:
      S3B_HOST: ${S3B_HOST:-0.0.0.0}
      S3B_PORT: ${S3B_APP_PORT:-8080}
      S3B_DATA_DIR: ${S3B_DATA_DIR:-/data}
    user: "${CURRENT_USER:-1000}:${CURRENT_GROUP:-1000}"
    container_name: s3b
    ports:
      - "${S3B_HOST_PORT:-8088}:${S3B_APP_PORT:-8080}"
    volumes:
      - "${S3B_DATA_PATH:-./data}:/data"
    restart: unless-stopped
